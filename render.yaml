# Render Blueprint for The Sterling Syndicate.
#
# One-click deploy: push this file, then in the Render dashboard choose
# "New +" → "Blueprint" and point it at this repo. Render provisions the
# database and both services, wiring the cross-service values below.
#
# Two secrets can't be auto-generated and MUST be set once (see DEPLOY.md):
#   • FIELD_ENCRYPTION_KEY  — 32-byte url-safe base64 Fernet key
#   • OPENAI_API_KEY        — only if you use the LLM features
#
# Optional hardening:
#   • SIGNUP_INVITE_CODE    — lock public signup behind an invite
#   • PAYMENT_STEPUP_REQUIRED / PAYMENT_STEPUP_TOTP_SECRET
#
# Note: the Docker-in-Docker Execution sandbox from docker-compose is NOT part
# of this deploy (Render has no privileged DinD). The core app — auth, leads,
# proposals, CRM, analytics — runs fully; SANDBOX_ALLOW_SUBPROCESS_FALLBACK is
# left false so no untrusted code runs on the host.
#
# Frontend = Render Static Site (free, never sleeps).
# Backend  = Docker web service (free tier sleeps ~15m without traffic).

databases:
  - name: sterling-db
    plan: free
    databaseName: sterling
    user: sterling
    postgresMajorVersion: "16"
    # pgvector ships on Render's Postgres 16; migration 0001 runs CREATE
    # EXTENSION IF NOT EXISTS vector on first boot.

services:
  # ── Backend API (FastAPI) ────────────────────────────────────────────
  - type: web
    name: sterling-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sterling-db
          property: connectionString
      # Auto-generated once, then stable across deploys.
      - key: JWT_SECRET_KEY
        generateValue: true
      # Must be set manually in the dashboard (Fernet key — see DEPLOY.md).
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      # Optional: only needed for LLM-backed drafting/replies.
      - key: OPENAI_API_KEY
        sync: false
      # Password-reset links must point at the live SPA (not localhost).
      # Update if the web service URL ever changes.
      - key: FRONTEND_URL
        value: https://sterling-web-6u7n.onrender.com
      # Pin full origin — fromService host alone omits .onrender.com and breaks CORS.
      - key: CORS_ORIGINS
        value: https://sterling-web-6u7n.onrender.com
      - key: SANDBOX_ALLOW_SUBPROCESS_FALLBACK
        value: "false"
      # Single worker: in-memory rate limits are process-local; free tier RAM is tight.
      - key: UVICORN_WORKERS
        value: "1"
      - key: SIGNUP_INVITE_CODE
        sync: false

  # ── Frontend (Vite SPA as a Render Static Site) ──────────────────────
  - type: web
    runtime: static
    name: sterling-web
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - path: /*
        name: Permissions-Policy
        value: geolocation=(), microphone=(), camera=(), payment=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://sterling-api-6u7n.onrender.com https://*.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    envVars:
      - key: VITE_API_URL
        value: https://sterling-api-6u7n.onrender.com
