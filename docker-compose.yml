services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sterling-syndicate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sterling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-sterling}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sterling} -d ${POSTGRES_DB:-sterling}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Rootless DinD for Execution_Agent. No host ports. Lives only on the `sandbox`
  # network so the frontend container cannot reach the Docker API. TLS is not
  # used with rootless DinD (breaks image pulls / DX); network segmentation is
  # the isolation boundary. Sandbox *workload* containers still use --network none.
  dind:
    image: docker:27-dind-rootless
    container_name: sterling-syndicate-dind
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - dind_data:/home/rootless/.local/share/docker
    networks:
      - sandbox
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sterling-syndicate-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sterling}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-sterling}
      DOCKER_HOST: tcp://dind:2375
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-python:3.11-slim}
      SANDBOX_ALLOW_SUBPROCESS_FALLBACK: "false"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      dind:
        condition: service_healthy
    networks:
      - edge
      - data
      - sandbox
    command: >
      sh -c "alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-1}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: sterling-syndicate-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      backend:
        condition: service_started
    networks:
      - edge

networks:
  # Browser-facing: frontend + backend only
  edge:
  # Postgres: backend + db only (frontend cannot reach DB)
  data:
  # DinD: backend + dind only (frontend cannot reach Docker API)
  sandbox:

volumes:
  postgres_data:
  dind_data:
