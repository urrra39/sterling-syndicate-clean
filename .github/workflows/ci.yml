name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    name: Backend unit tests (SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      FORCE_SQLITE: "1"
      JWT_SECRET_KEY: "ci-secret-key-at-least-32-characters-long"
      # Valid 32-byte url-safe base64 Fernet key (test-only, not a production secret)
      FIELD_ENCRYPTION_KEY: "FgX1AP70-qcDe8W2bAxGQ0LQOL76Cpw0Lyf7eJOPgDk="
      TESTING: "True"
      ENVIRONMENT: "test"
      CORS_ORIGINS: "http://localhost:5173"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Dependency vulnerability audit (pip-audit)
        # Gates on *direct* deps that have a published fix (see scripts/gate_pip_audit.py).
        # Transitive / unfixed advisories are logged but do not fail the job.
        run: |
          pip install pip-audit
          pip-audit -l -f json -o "$RUNNER_TEMP/pip-audit.json" --progress-spinner off || true
          python ../scripts/gate_pip_audit.py "$RUNNER_TEMP/pip-audit.json"
      - name: Run pytest
        run: pytest -q

  backend-integration:
    name: Backend integration tests (PostgreSQL + pgvector)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sterling
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: sterling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sterling -d sterling_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "postgresql+psycopg://sterling:ci_test_password@localhost:5432/sterling_test"
      JWT_SECRET_KEY: "ci-secret-key-at-least-32-characters-long"
      # Valid 32-byte url-safe base64 Fernet key (test-only, not a production secret)
      FIELD_ENCRYPTION_KEY: "FgX1AP70-qcDe8W2bAxGQ0LQOL76Cpw0Lyf7eJOPgDk="
      TESTING: "True"
      ENVIRONMENT: "test"
      CORS_ORIGINS: "http://localhost:5173"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Dependency vulnerability audit (npm audit)
        run: npm audit --audit-level=high
      - name: Lint (ESLint)
        run: npm run lint
      - name: Type check (tsc)
        run: npx tsc --noEmit
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build
        run: npm run build
